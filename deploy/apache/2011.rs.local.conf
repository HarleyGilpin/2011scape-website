# Local Apache test rig — mirrors deploy/apache/2011.rs.conf but
# without TLS, on port 8080, with module LoadModule lines included
# (production sources them via /etc/apache2/mods-enabled/).
#
# Usage (CachyOS / Arch — adjust paths for Debian/Ubuntu):
#
#   sudo pacman -S --needed apache php-fpm
#   sudo systemctl start php-fpm
#
#   # Grant http user traversal/read on the repo (one-time):
#   sudo setfacl -m u:http:rx /home/$USER /home/$USER/Documents
#   sudo setfacl -R -m u:http:rX <repo-root>
#   sudo setfacl -R -m u:http:rwX <repo-root>/storage <repo-root>/bootstrap/cache
#
#   # Mount the repo + a stub forum:
#   sudo ln -sfn <repo-root> /var/www/2011scape-website
#   sudo mkdir -p /var/www/html/services/m=forum
#   # Optionally drop a stub /var/www/html/services/m=forum/index.php
#
#   sudo httpd -f /var/www/2011scape-website/deploy/apache/2011.rs.local.conf -k start
#   curl -I http://127.0.0.1:8080/
#   curl -I http://127.0.0.1:8080/services/m=forum/
#
# To stop:  sudo httpd -f .../2011.rs.local.conf -k stop

ServerRoot "/etc/httpd"
ServerName 127.0.0.1
PidFile /run/httpd/httpd-local.pid
Mutex file:/run/httpd default
User http
Group http
Listen 127.0.0.1:8080

LoadModule mpm_event_module    modules/mod_mpm_event.so
LoadModule unixd_module        modules/mod_unixd.so
LoadModule authn_core_module   modules/mod_authn_core.so
LoadModule authz_core_module   modules/mod_authz_core.so
LoadModule authz_host_module   modules/mod_authz_host.so
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule alias_module        modules/mod_alias.so
LoadModule dir_module          modules/mod_dir.so
LoadModule mime_module         modules/mod_mime.so
LoadModule rewrite_module      modules/mod_rewrite.so
LoadModule headers_module      modules/mod_headers.so
LoadModule setenvif_module     modules/mod_setenvif.so
LoadModule log_config_module   modules/mod_log_config.so
LoadModule env_module          modules/mod_env.so
LoadModule filter_module       modules/mod_filter.so
LoadModule proxy_module        modules/mod_proxy.so
LoadModule proxy_fcgi_module   modules/mod_proxy_fcgi.so

TypesConfig conf/mime.types
AddType application/x-httpd-php .php
ErrorLog  /tmp/httpd-local-error.log
CustomLog /tmp/httpd-local-access.log "%h %l %u %t \"%r\" %>s %b"
LogLevel info

<VirtualHost 127.0.0.1:8080>
    ServerName 127.0.0.1
    DocumentRoot /var/www/2011scape-website/public

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/php-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    Alias /services/m=forum /var/www/html/services/m=forum
    <Directory /var/www/html/services/m=forum>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <Directory /var/www/2011scape-website/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <LocationMatch "^/(css|img|static|wb-static|jagex\.com|downloads)/">
        Header set Cache-Control "public, immutable, max-age=31536000"
    </LocationMatch>

    <FilesMatch "(^\.env|^composer\.(json|lock)$|^artisan$)">
        Require all denied
    </FilesMatch>
    <DirectoryMatch "/(\.git|tests|storage|bootstrap/cache)/">
        Require all denied
    </DirectoryMatch>
</VirtualHost>
