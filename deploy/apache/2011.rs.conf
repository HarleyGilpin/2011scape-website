# 2011scape — Apache 2.4 vhost (production: world2)
#
# Layout
#   Laravel app     /var/www/2011scape-website/        (this repo)
#   Document root   /var/www/2011scape-website/public/
#   XenForo 2       /var/www/html/services/m=forum/    (existing, untouched)
#
# Required modules: rewrite headers alias ssl proxy_fcgi setenvif
#   sudo a2enmod rewrite headers alias ssl proxy_fcgi setenvif
#
# Symlink into sites-available, enable, reload:
#   sudo ln -sf /var/www/2011scape-website/deploy/apache/2011.rs.conf \
#               /etc/apache2/sites-available/2011.rs.conf
#   sudo a2ensite 2011.rs && sudo apache2ctl configtest && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName 2011.rs
    ServerAlias www.2011.rs
    Redirect permanent / https://2011.rs/
</VirtualHost>

<VirtualHost *:443>
    ServerName 2011.rs
    ServerAlias www.2011.rs
    DocumentRoot /var/www/2011scape-website/public

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/2011.rs/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/2011.rs/privkey.pem

    # PHP-FPM for every .php in the docroot AND under the forum alias.
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    # ------------------------------------------------------------------
    # Forum: alias to the existing XF2 install. Apache resolves this
    # before docroot, so Laravel never sees /services/m=forum/* traffic.
    # ------------------------------------------------------------------
    Alias /services/m=forum /var/www/html/services/m=forum
    <Directory /var/www/html/services/m=forum>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # ------------------------------------------------------------------
    # Laravel front controller
    # ------------------------------------------------------------------
    <Directory /var/www/2011scape-website/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # ------------------------------------------------------------------
    # Long-cache the legacy 2011 assets (immutable by design)
    # ------------------------------------------------------------------
    <LocationMatch "^/(css|img|static|wb-static|jagex\.com|downloads)/">
        Header set Cache-Control "public, immutable, max-age=31536000"
    </LocationMatch>

    # ------------------------------------------------------------------
    # Defence-in-depth: hide app internals from the web
    # ------------------------------------------------------------------
    <FilesMatch "(^\.env|^composer\.(json|lock)$|^artisan$)">
        Require all denied
    </FilesMatch>
    <DirectoryMatch "/(\.git|tests|storage|bootstrap/cache)/">
        Require all denied
    </DirectoryMatch>

    # ------------------------------------------------------------------
    # Reasonable HTTP defaults
    # ------------------------------------------------------------------
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog  ${APACHE_LOG_DIR}/2011.rs-error.log
    CustomLog ${APACHE_LOG_DIR}/2011.rs-access.log combined
</VirtualHost>
